  <style>
        /* Carousel Specific Dark Styling */
        .graphics-section {
            padding: var(--space-24) 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .carousel-container {
            width: 100vw;
            height: 80vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            font-size: 24px;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .carousel-arrow:hover {
            background: #fff;
            color: #000;
        }

        .carousel-arrow.left { left: 20px; }
        .carousel-arrow.right { right: 20px; }

        .carousel {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .carousel-item {
            position: absolute;
            top: 50%;
            left: 50%;
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .carousel-item img {
            height: 60vh;
            max-width: 400px;
            width: auto;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Positions */
        .pos-0 { transform: translate(calc(-50% - 400px), -50%) scale(0.6); opacity: 0.3; z-index: 1; }
        .pos-1 { transform: translate(calc(-50% - 200px), -50%) scale(0.8); opacity: 0.6; z-index: 2; }
        .pos-2 { transform: translate(-50%, -50%) scale(1); opacity: 1; z-index: 3; box-shadow: 0 0 30px rgba(255,255,255,0.1); }
        .pos-3 { transform: translate(calc(-50% + 200px), -50%) scale(0.8); opacity: 0.6; z-index: 2; }
        .pos-4 { transform: translate(calc(-50% + 400px), -50%) scale(0.6); opacity: 0.3; z-index: 1; }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>

<body>

    <script>
        // Simple Carousel Logic
        const items = document.querySelectorAll('.carousel-item');
        let current = 0;

        function update() {
            items.forEach((item, index) => {
                item.className = 'carousel-item hidden';
                let diff = index - current;
                
                // Wrap around logic
                if (diff < -2) diff += items.length;
                if (diff > 2) diff -= items.length;

                if (diff === 0) item.className = 'carousel-item pos-2';
                else if (diff === -1) item.className = 'carousel-item pos-1';
                else if (diff === 1) item.className = 'carousel-item pos-3';
                else if (diff === -2) item.className = 'carousel-item pos-0';
                else if (diff === 2) item.className = 'carousel-item pos-4';
            });
        }

        document.getElementById('nextBtn').onclick = () => {
            current = (current + 1) % items.length;
            update();
        };

        document.getElementById('prevBtn').onclick = () => {
            current = (current - 1 + items.length) % items.length;
            update();
        };

        // Initialize
        update();
    </script>
